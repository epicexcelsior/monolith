appId: com.monolith.app
---
# Test: Tab navigation works
- launchApp:
    stopApp: false
- runFlow: utils/wait-for-tower.yaml

# Navigate to Board tab
- tapOn:
    text: "Board"
- waitForAnimationToEnd
- takeScreenshot: "03-board-tab"

# Navigate to Me tab
- tapOn:
    text: "Me"
- waitForAnimationToEnd
- takeScreenshot: "03-me-tab"

# Navigate back to tower
- tapOn:
    text: "Tower"
- waitForAnimationToEnd
- takeScreenshot: "03-tower-tab"
