appId: com.monolith.app
---
# Test: Leaderboard loads and is tappable
- launchApp:
    stopApp: false

- tapOn:
    text: "Board"
- waitForAnimationToEnd
- takeScreenshot: "04-board-initial"

# Check leaderboard entries exist
- assertVisible:
    text: "Keepers"
    timeout: 5000

- takeScreenshot: "04-leaderboard-loaded"

# Tap first leaderboard entry → should navigate to tower and select block
- tapOn:
    index: 0
    text: "Block"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: "04-block-selected-from-leaderboard"
