appId: com.monolith.app
---
# Test: Connection banner shows correct states
# Run while local server is UP
- launchApp:
    stopApp: false
- runFlow: utils/wait-for-tower.yaml
- takeScreenshot: "05-connection-live"

# Check that connection banner is NOT showing error when connected
- assertNotVisible:
    text: "Offline"
    timeout: 3000
    optional: true
