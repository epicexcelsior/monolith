# Claim Celebration Flow
# Tests: onboarding claim → cinematic UI hide → celebration completes → UI restores
#
# What this verifies:
#   - Onboarding claim button is tappable and correctly labeled
#   - During celebration (cinematicMode=true): HUD disappears
#   - After celebration (5.5–7.5s): HUD reappears
#
# What Maestro CANNOT verify (must test manually on device):
#   - Haptic vibration timing
#   - 3D VFX particles (R3F canvas is opaque to accessibility tree)
#   - Sound playback
#   - Camera movement / zoom sequence
#
# Run: maestro test .maestro/06-claim-celebration.yaml
# Requires: fresh install or cleared onboarding state
appId: com.monolith.mobile
---
# Launch fresh
- launchApp:
    clearState: false

# Wait for tower to load
- extendedWaitUntil:
    visible:
      id: "onboarding-claim-button"
    timeout: 20000

- takeScreenshot: "01-before-claim"

# Tap the CLAIM IT button
- tapOn:
    id: "onboarding-claim-button"

- takeScreenshot: "02-claim-tapped"

# During celebration: cinematicMode=true hides the HUD
# The onboarding claim button should also disappear (it's inside cinematicWrapper now)
- extendedWaitUntil:
    notVisible:
      id: "onboarding-claim-button"
    timeout: 5000

- takeScreenshot: "03-cinematic-mode-active"

# After celebration ends (7.5s firstClaim + 0.3s buffer = ~8s max)
# UI should restore. Onboarding should advance to customize phase.
- extendedWaitUntil:
    visible: "Customize"
    timeout: 12000

- takeScreenshot: "04-post-celebration"
